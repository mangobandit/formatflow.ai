<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found | FormatFlow</title>
  <meta name="robots" content="noindex" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;min-height:100vh;display:grid;place-items:center;text-align:center;padding:24px;color:#f8fff9;background:linear-gradient(160deg,#050808,#0d1616 60%,#07100f)}
    .mark{width:64px;height:64px;border-radius:18px;background:#07100f;display:grid;place-items:center;margin:0 auto 24px;color:#ffd166;font-weight:900;font-size:1.5rem;border:1px solid rgba(128,255,229,.3)}
    h1{font-size:clamp(2.4rem,6vw,4rem);letter-spacing:-.04em;margin-bottom:12px}
    p{color:#cfe3de;font-size:1.1rem;max-width:460px;margin:0 auto 28px}
    a{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:13px 24px;font-weight:800;text-decoration:none;background:linear-gradient(135deg,#5eead4,#dff7b2 55%,#ffd166);color:#07100f}
    .grad{background:linear-gradient(120deg,#fff,#5eead4 45%,#ffd166);-webkit-background-clip:text;background-clip:text;color:transparent}
  </style>
</head>
<body>
  <main>
    <div class="mark">FF</div>
    <h1><span class="grad">404</span></h1>
    <p>That page wandered off. The deck is fine — let's get you back to FormatFlow.</p>
    <a href="/">Back to home</a>
  </main>
</body>
</html>
